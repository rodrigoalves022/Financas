name: Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "finance-app-react/**"
      - ".github/workflows/android-apk.yml"

jobs:
  build-apk:
    name: Build debug APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: finance-app-react

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: finance-app-react/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Build debug APK
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: controle-financeiro-debug-apk
          path: finance-app-react/android/app/build/outputs/apk/debug/app-debug.apk
